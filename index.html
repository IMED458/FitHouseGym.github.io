<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fit House Gym - მენეჯმენტი</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <link rel="icon" type="image/png" href="fithause logo.png">
  <link rel="shortcut icon" type="image/png" href="fithause logo.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <!-- EmailJS SDK -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <!-- QR Code Generator -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- QR Code Scanner -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  
  <script type="module" src="assets/js/app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div id="loginScreen">
    <div class="auth-shell">
      <div class="auth-brand">
        <div class="auth-brand-logo">
          <img src="fithause logo.png" alt="Fit House" class="auth-logo-image" onerror="this.style.display='none'">
        </div>
        <h1 class="auth-brand-title">FIT HOUSE</h1>
        <p class="auth-brand-subtitle">GYM MANAGEMENT SYSTEM</p>
      </div>

      <div class="auth-alert">
        <i class="fas fa-circle-exclamation"></i>
        <span>Authorized personnel access only. Unauthorized login attempts are monitored.</span>
      </div>

      <div class="auth-panel">
        <div class="auth-field">
          <label for="loginUsername">USERNAME</label>
          <div class="auth-input-wrap">
            <i class="far fa-user"></i>
            <input type="text" id="loginUsername" placeholder="admin" class="auth-input">
          </div>
        </div>

        <div class="auth-field">
          <div class="auth-field-head">
            <label for="adminPassword">PASSWORD</label>
            <button type="button" class="auth-helper-btn" onclick="window.showForgotPasswordInfo()">Forgot password?</button>
          </div>
          <div class="auth-input-wrap">
            <i class="far fa-lock"></i>
            <input type="password" id="adminPassword" placeholder="••••••••" class="auth-input">
          </div>
        </div>

        <button class="auth-submit-btn" onclick="login()">
          <i class="fas fa-arrow-right-to-bracket"></i>
          <span>შესვლა</span>
        </button>
      </div>

      <div class="auth-footer">SECURE ADMIN ACCESS</div>
    </div>
  </div>
  
  <div id="mainApp" style="display:none">
    <div class="theme-toggle" onclick="toggleTheme()">
      <i class="fas fa-sun"></i>
    </div>
    
    <div class="container">
      <div class="header">
        <img src="fithause logo.png" alt="Fit House" class="logo" onerror="this.style.display='none'">
        <h1 class="gym-title">Fit House Gym</h1>
        <div class="header-tools">
          <div id="currentUserDisplay" class="current-user-display"></div>
          <div id="roleBadge" class="role-badge"></div>
          <button class="btn bg-slate-700 hover:bg-slate-600 header-logout-btn" onclick="window.logout()">
            <i class="fas fa-right-from-bracket"></i> გასვლა
          </button>
        </div>
      </div>
      
      <div class="nav-tabs">
        <button class="nav-tab active" onclick="showTab('dashboard')">დეშბორდი</button>
        <button class="nav-tab" onclick="showTab('register')">რეგისტრაცია</button>
        <button class="nav-tab" onclick="showTab('search')">ძიება</button>
        <button class="nav-tab" onclick="showTab('checkin')">შესვლა</button>
        <button class="nav-tab" onclick="showTab('expired')">ვადაგასული</button>
        <button class="nav-tab" onclick="showTab('products')">პროდუქტები</button>
        <button class="nav-tab" data-admin-only onclick="showTab('finance')">ფინანსები</button>
        <button class="nav-tab" data-admin-only onclick="showTab('stats')">სტატისტიკა</button>
        <button class="nav-tab" data-admin-only onclick="showTab('users')">იუზერები</button>
        <button class="nav-tab" onclick="showTab('settings')">პარამეტრები</button>
        <button class="nav-tab bg-purple-600 hover:bg-purple-700" onclick="openBulkMessageModal()">
          <i class="fas fa-envelope"></i> შეტყობინება
        </button>
