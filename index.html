<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitHouse Gym</title>
  <meta http-equiv="refresh" content="0;url=/member/">
  <link rel="manifest" href="/member/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FitHouse">
  <link rel="apple-touch-icon" href="/fithause logo.png">
  <meta name="theme-color" content="#020617">
  <style>
    body { margin:0; background:#020617; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:system-ui,sans-serif; }
    .loader { text-align:center; color:#94a3b8; }
    .logo { width:72px; height:72px; border-radius:18px; margin:0 auto 16px; display:block; }
    .title { font-size:1.3rem; font-weight:900; color:#fff; margin-bottom:6px; }
    .sub { font-size:0.85rem; color:#64748b; }
    .spinner { width:28px; height:28px; border:3px solid #1e293b; border-top-color:#ef4444; border-radius:50%; animation:spin 0.8s linear infinite; margin:16px auto 0; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader">
    <img src="/fithause logo.png" class="logo" onerror="this.style.display='none'">
    <div class="title">FitHouse Gym</div>
    <div class="sub">გადამისამართება...</div>
    <div class="spinner"></div>
  </div>
  <script>
    window.location.replace('/member/');
  </script>
</body>
</html>
