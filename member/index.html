<!DOCTYPE html>
<html lang="ka" class="dark">

  <link rel="manifest" href="/member/manifest.json">

    gtag('config', 'G-QQ76P1XCGY');

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { background: #020617; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    .tab-btn { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 12px; font-weight: 700; font-size: 0.875rem; cursor: pointer; transition: all 0.15s; width: 100%; text-align: left; border: none; background: transparent; color: #94a3b8; }
    .tab-btn:hover { background: #1e293b; color: #e2e8f0; }
    .tab-btn.active { background: #1e293b; color: #ef4444; }
    .tab-btn.active i { color: #ef4444; }
    .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 16px; }
    .badge-active { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); padding: 2px 10px; border-radius: 9999px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
    .badge-expired { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); padding: 2px 10px; border-radius: 9999px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
    .badge-paused { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); padding: 2px 10px; border-radius: 9999px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
    .btn-primary { background: linear-gradient(135deg, #dc2626, #e11d48); color: white; border: none; border-radius: 12px; padding: 12px 20px; font-weight: 800; font-size: 0.9rem; cursor: pointer; transition: opacity 0.15s; width: 100%; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .form-input { background: #020617; border: 1px solid #1e293b; border-radius: 12px; padding: 12px 12px 12px 42px; color: #f1f5f9; font-size: 16px; width: 100%; outline: none; transition: border-color 0.15s; }
    .form-input:focus { border-color: rgba(239,68,68,0.5); }
    .pw-toggle-btn { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none;
                     border:none; color:#475569; cursor:pointer; padding:6px; font-size:0.85rem; z-index:1; }
    .pw-toggle-btn:hover { color:#94a3b8; }
    #qr-reader { border-radius: 12px; overflow: hidden; }
    #qr-reader video { border-radius: 12px; }
    .visit-card-approved { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); border-radius: 12px; padding: 14px 16px; }
    .visit-card-rejected { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 12px; padding: 14px 16px; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .anim-in { animation: slideIn 0.2s ease; }
    .checkin-result-approved { background: rgba(16,185,129,0.1); border: 2px solid #10b981; border-radius: 20px; padding: 24px 16px; text-align: center; overflow: hidden; }
    .checkin-result-rejected { background: rgba(239,68,68,0.1); border: 2px solid #ef4444; border-radius: 20px; padding: 24px 16px; text-align: center; overflow: hidden; }
    .checkin-headline { font-size: clamp(1.2rem, 5vw, 1.8rem); font-weight: 900; line-height: 1.2; word-break: break-word; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
  
    .nav-label-short { display: none; }
    /* ── Mobile (≤767px) ────────────────────────────────────────────────────
       The sidebar previously stacked above the content as a full-width column,
       so on a phone you scrolled past every nav item before reaching anything.
       It becomes a horizontal, snapping tab strip instead. */
    @media (max-width: 767px) {
      body { padding-bottom: env(safe-area-inset-bottom); }

      /* Sidebar → sticky horizontal tab strip */
      #sidebar-card, #trainer-sidebar-card {
        position: sticky; top: 56px; z-index: 30;
        padding: 10px 10px 8px !important; margin-bottom: 2px;
        background: rgba(15,23,42,0.95); backdrop-filter: blur(10px);
      }
      #sidebar-nav {
        display: flex !important; gap: 8px; overflow-x: auto; padding-bottom: 2px;
        scroll-snap-type: x proximity; -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      #sidebar-nav::-webkit-scrollbar { display: none; }
      #sidebar-nav .tab-btn {
        width: auto !important; flex: 0 0 auto; white-space: nowrap;
        scroll-snap-align: start; padding: 11px 15px; font-size: 0.83rem;
        border: 1px solid #1e293b; min-height: 44px; /* comfortable tap target */
      }
      #sidebar-nav .tab-btn.active { border-color: rgba(239,68,68,0.5); }

      /* Compact labels so several tabs fit the strip at once */
      #sidebar-nav .nav-label-full { display: none; }
      #sidebar-nav .nav-label-short { display: inline; }

      /* Profile block: compact, and never pushes the tabs off-screen */
      .sidebar-profile { padding: 10px 12px !important; margin-bottom: 10px !important; }
      .sidebar-profile .avatar { width: 38px !important; height: 38px !important; font-size: 1rem !important; }

      /* Content: no nested scroll container — let the page scroll naturally */
      #tab-content-wrap, #tab-wrap {
        max-height: none !important; overflow: visible !important;
      }
      #tab-content, #tab-body { padding: 16px 14px !important; }

      /* Layout gaps */
      .main-shell { gap: 12px !important; }
      main { padding-left: 12px !important; padding-right: 12px !important; padding-top: 12px !important; }

      /* Typography scales down a notch */
      h2 { font-size: 1.15rem !important; }

      /* Tables scroll inside their own box rather than breaking the page */
      table { min-width: 520px; }
      .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

      /* Full-width primary actions are far easier to hit */
      .btn-primary { width: 100%; min-height: 48px; }

      /* Cards breathe less on a narrow screen */
      .card { border-radius: 14px; }
    }

    /* Respect users who ask for less motion */
    @media (prefers-reduced-motion: reduce) {
      .anim-in { animation: none !important; }
      * { transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body class="min-h-screen text-slate-100">

<!-- Header -->
<header class="sticky top-0 z-50 border-b border-slate-900" style="background: rgba(2,6,23,0.9); backdrop-filter: blur(12px);">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">

      <div style="width:40px;height:40px;background:linear-gradient(135deg,#dc2626,#e11d48);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:0.95rem;color:white;letter-spacing:1px;">FH</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
import { initializeFirestore, collection, query, where, getDocs, doc, getDoc, setDoc, addDoc, onSnapshot, updateDoc, orderBy, limit } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';

document.getElementById('fyear').textContent = new Date().getFullYear();

// ── Firebase ──────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: 'AIzaSyA1HOc9IvnfougHBMHRnQwktfOrS72Ttt8',
  authDomain: 'fit-house-gym-d3595.firebaseapp.com',
  projectId: 'fit-house-gym-d3595',
  storageBucket: 'fit-house-gym-d3595.firebasestorage.app',
  messagingSenderId: '548276737406',
  appId: '1:548276737406:web:12286429916b8c751fcf2f'
};
const fbApp = initializeApp(firebaseConfig);
const db = initializeFirestore(fbApp, { experimentalForceLongPolling: true, useFetchStreams: false });

// ── State ─────────────────────────────────────────────────────────────────
let session = null;
try { session = JSON.parse(localStorage.getItem('fh_member_session') || 'null'); } catch(_) {}
let member = null;
let activeTab = 'overview';
let visits = [];
let payments = [];
let subHistory = [];
let mySessions = [];
let myTrainerPayments = [];
let calCursor = new Date();
let memberUnsub = null;
let visitsUnsub = null;
let sessionsUnsub = null;
let trainerPayUnsub = null;
let qrScanner = null;
let qrScannerRunning = false;
let pendingCheckinToken = null;

// ── Flitt payments (backend-only; nothing secret ever lives here) ──────────
const API_BASE = 'https://fithouse-payments.gymfithouse1.workers.dev';
let flittEnabled = false;
let flittMode = null;

const SUB_NAMES = {
  '12visits': '12 ვარჯიში', single_visit: '1 ვიზიტი',
  morning: 'დილის (09-16)', unlimited: 'ულიმიტო', other: 'სხვა'
};
function subName(t) { return SUB_NAMES[t] || t || '—'; }

function formatD(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}
function formatDT(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return `${formatD(iso)} — ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function remainingDays(endIso) {
  if (!endIso) return 0;
  const diff = new Date(endIso) - new Date();
  return diff > 0 ? Math.ceil(diff / 86400000) : 0;
}
function isExpiredSub(m) {
  if (!m) return true;
  if (m.status !== 'active') return true;
  if (m.remainingVisits !== null && m.remainingVisits <= 0) return true;
  if (m.subscriptionEndDate && new Date() > new Date(m.subscriptionEndDate)) return true;
  return false;
}
function effectiveStatus(m) {
  if (!m) return 'expired';
  if (m.status === 'active') {
    if ((m.remainingVisits !== null && m.remainingVisits <= 0) || (m.subscriptionEndDate && new Date() > new Date(m.subscriptionEndDate))) return 'expired';
  }
  return m.status || 'expired';
}

// ── URL helpers ───────────────────────────────────────────────────────────
function getUrlParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

// ── Render entry ──────────────────────────────────────────────────────────
pendingCheckinToken = getUrlParam('checkin');

if (!session) {
  renderLogin();
} else {
  startDashboard();
}

// ── Login ─────────────────────────────────────────────────────────────────
function renderLogin() {
  stopListeners();
  document.getElementById('header-user').innerHTML = '';
  document.getElementById('app').innerHTML = `
    <div class="flex justify-center items-center py-12">
      <div class="w-full max-w-md card p-7 relative overflow-hidden anim-in">
        <div style="position:absolute;top:0;left:25%;right:25%;height:2px;background:linear-gradient(90deg,#dc2626,#e11d48);"></div>
        <div class="text-center mb-8">
          <div style="width:56px;height:56px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;"><i class="fas fa-user" style="color:#ef4444;font-size:1.3rem;"></i></div>
          <h2 style="font-size:1.4rem;font-weight:900;color:white;">მომხმარებლის კაბინეტი</h2>
          <p style="color:#64748b;font-size:0.85rem;margin-top:6px;">FitHouse წევრის მონაცემებით ავტორიზაცია</p>
        </div>
        <div id="login-error" style="display:none;" class="mb-5 p-4 text-sm font-bold rounded-xl flex items-start gap-3" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171;"></div>
        <form id="login-form" class="space-y-5">
          <div>
            <label style="display:block;font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:#64748b;margin-bottom:8px;">მეილი</label>
            <div style="position:relative;">
              <i class="fas fa-envelope" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#475569;font-size:0.85rem;"></i>
              <input id="l-email" type="email" required placeholder="user@example.com" class="form-input" autocomplete="email">
            </div>
          </div>
          <div>
            <label style="display:block;font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:#64748b;margin-bottom:8px;">პირადი ნომერი</label>
            <div style="position:relative;">
              <i class="fas fa-lock" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#475569;font-size:0.85rem;"></i>
              <input id="l-pid" type="password" required placeholder="••••••••••••" class="form-input" autocomplete="off" style="letter-spacing:0.15em;">
              <button type="button" class="pw-toggle-btn" onclick="window.togglePwVisibility('l-pid', this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#475569;cursor:pointer;padding:4px;font-size:0.85rem;z-index:1;"><i class="fas fa-eye"></i></button>
            </div>
          </div>
          <button type="submit" class="btn-primary mt-2" id="login-btn">შესვლა</button>
        </form>
        <p style="margin-top:20px;text-align:center;font-size:0.78rem;color:#475569;">გამოიყენეთ Fit House-ში რეგისტრირებული მეილი და პირადი ნომერი</p>
      </div>
    </div>
  `;

  const form = document.getElementById('login-form');
  form.addEventListener('submit', async e => {
    e.preventDefault();
    const email = document.getElementById('l-email').value.trim().toLowerCase();
    const pid = document.getElementById('l-pid').value.trim();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');
    btn.disabled = true; btn.textContent = 'მიმდინარეობს შესვლა...';
    errEl.style.display = 'none';

    // Checks both SDK and REST fallback (Android Firestore SDK can silently fail)
    async function findMemberByEmail(emailVal) {
      // Try SDK first
      try {
        const q = query(collection(db, 'members'), where('email', '==', emailVal));
        const snap = await getDocs(q);
        if (!snap.empty) {
          const results = [];
          snap.forEach(d => results.push({ id: d.id, ...d.data() }));
          return results;
        }
      } catch(_) {}
      // REST fallback
      try {
        const pid2 = 'fit-house-gym-d3595';
        const url = `https://firestore.googleapis.com/v1/projects/${pid2}/databases/(default)/documents:runQuery`;
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ structuredQuery: {
            from: [{ collectionId: 'members' }],
            where: { fieldFilter: { field: { fieldPath: 'email' }, op: 'EQUAL', value: { stringValue: emailVal } } }
          }})
        });
        const rows = await res.json();
        const results = [];
        for (const row of rows) {
          if (!row.document) continue;
          const parts = row.document.name.split('/');
          const id = parts[parts.length - 1];
          const f = row.document.fields || {};
          const toVal = v => v?.stringValue ?? v?.integerValue ?? v?.doubleValue ?? v?.booleanValue ?? null;
          const data = {};
          for (const [k, v] of Object.entries(f)) data[k] = toVal(v);
          results.push({ id, ...data });
        }
        return results;
      } catch(_) {}
      return [];
    }

    try {
      const candidates = await findMemberByEmail(email);
      if (!candidates.length) {
        showLoginError('მეილი ან პაროლი არასწორია');
        return;
      }
      // Three ways in, in priority order. `reason` decides whether the member
      // lands on the dashboard or is forced to set a permanent password first.
      let found = null;
      let reason = null;

      // 1. Their own permanent password.
      found = candidates.find(d => d.password && d.password === pid);

      // 2. A staff-issued one-time code (stored hashed, single use, expiring).
      if (!found) {
        const otpHash = await sha256Hex(pid.toUpperCase());
        const otpMatch = candidates.find(d =>
          d.tempPasswordHash &&
          d.tempPasswordHash === otpHash &&
          d.tempPasswordExpiresAt &&
          new Date(d.tempPasswordExpiresAt) > new Date()
        );
        if (otpMatch) { found = otpMatch; reason = 'otp'; }
        else {
          // Distinguish "expired code" from "wrong password" so the member
          // knows to ask for a new one rather than retrying.
          const stale = candidates.find(d => d.tempPasswordHash === otpHash);
          if (stale) { showLoginError('ერთჯერადი პაროლის ვადა ამოიწურა. მოითხოვეთ ახალი.'); return; }
        }
      }

      // 3. Legacy first login: personal ID, only while no password is set.
      if (!found) {
        const pidMatch = candidates.find(d => !d.password && d.personalId === pid);
        if (pidMatch) { found = pidMatch; reason = 'first-login'; }
      }

      if (!found) { showLoginError('მეილი ან პაროლი არასწორია'); return; }

      // Either route means the member has no password of their own yet.
      if (reason) {
        renderForcePasswordChange(found, reason === 'otp' ? pid : null);
        return;
      }

      session = { memberId: found.id, email: found.email, firstName: found.firstName, lastName: found.lastName, ts: Date.now() };

      // Exchange credentials for a server-signed session token. The backend
      // re-verifies them itself; the client-side check above is only for UX.
      // Failure here is non-fatal — it just means no online payment this session.
      try {
        const sres = await fetch(`${API_BASE}/auth/session`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pid }),
        });
        if (sres.ok) {
          const sdata = await sres.json();
          session.token = sdata.token;
          flittEnabled = Boolean(sdata.flitt_enabled);
          flittMode = sdata.flitt_mode || null;
          session.flittEnabled = flittEnabled;
          session.flittMode = flittMode;
        }
      } catch (_) { /* offline / functions not deployed — portal still works */ }

      localStorage.setItem('fh_member_session', JSON.stringify(session));
      const token = pendingCheckinToken;
      window.history.replaceState({}, '', '/member');
      pendingCheckinToken = token;
      startDashboard(token ? 'qr' : 'overview');
    } catch(err) {
      console.error(err);
      showLoginError('კავშირის შეცდომა. სცადეთ ხელახლა.');
    } finally {
      btn.disabled = false; btn.textContent = 'შესვლა';
    }
  });

  async function sha256Hex(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

/** Minimum bar for a permanent password. Kept deliberately modest. */
function validatePermanentPassword(pw) {
  if (!pw || pw.length < 6) return 'პაროლი უნდა შეიცავდეს მინიმუმ 6 სიმბოლოს';
  if (!/[a-zA-Zა-ჰ]/.test(pw)) return 'პაროლი უნდა შეიცავდეს მინიმუმ ერთ ასოს';
  if (!/[0-9]/.test(pw)) return 'პაროლი უნდა შეიცავდეს მინიმუმ ერთ ციფრს';
  return null;
}

/**
 * Shown instead of the dashboard when a member arrives with a one-time code or
 * on their very first personal-ID login. There is no way past it except
 * setting a permanent password.
 */
function renderForcePasswordChange(memberDoc, presetOtp) {
  const isOtp = Boolean(presetOtp);
  document.getElementById('app').innerHTML = `
    <div class="flex items-center justify-center" style="min-height:72vh;">
      <div class="card w-full anim-in" style="max-width:440px;padding:32px 26px;">
        <div style="text-align:center;margin-bottom:22px;">
          <div style="width:60px;height:60px;border-radius:50%;background:rgba(239,68,68,0.12);
                      border:2px solid rgba(239,68,68,0.4);display:flex;align-items:center;
                      justify-content:center;margin:0 auto 14px;">
            <i class="fas fa-shield-halved" style="color:#ef4444;font-size:1.4rem;"></i>
          </div>
          <h1 style="font-size:1.2rem;font-weight:900;color:#fff;margin-bottom:6px;">პაროლის დაყენება</h1>
          <p style="color:#64748b;font-size:0.85rem;line-height:1.5;">
            ${isOtp

window.submitForcePasswordChange = async function () {
  const m = window._fpcMember;
  if (!m) return;
  const otpEl = document.getElementById('fpc-otp');
  const nw = document.getElementById('fpc-new')?.value?.trim();
  const cf = document.getElementById('fpc-confirm')?.value?.trim();
  const btn = document.getElementById('fpc-btn');

  const invalid = validatePermanentPassword(nw);
  if (invalid) { showFpcError(invalid); return; }
  if (nw !== cf) { showFpcError('პაროლები არ ემთხვევა'); return; }

  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> ინახება...';

  try {
    // Re-verify the code at submit time — the field is editable, and it may
    // have expired or been superseded while this screen was open.
    if (otpEl) {
      const fresh = await getDoc(doc(db, 'members', m.id));
      const data = fresh.exists() ? fresh.data() : {};
      const hash = await sha256Hex(otpEl.value.trim().toUpperCase());
      const valid = data.tempPasswordHash === hash &&
        data.tempPasswordExpiresAt && new Date(data.tempPasswordExpiresAt) > new Date();
      if (!valid) {
        showFpcError('ერთჯერადი პაროლი არასწორია ან ვადაგასულია');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-check mr-2"></i> პაროლის განახლება';
        return;
      }
    }

    await updateDoc(doc(db, 'members', m.id), {
      password: nw,
      // Burn the code so it cannot be reused.
      tempPasswordHash: null,
      tempPasswordExpiresAt: null,
      mustChangePassword: false,
      passwordSetAt: new Date().toISOString(),
    });

    session = { memberId: m.id, email: m.email, firstName: m.firstName, lastName: m.lastName, ts: Date.now() };
    try {
      const sres = await fetch(`${API_BASE}/auth/session`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: m.email, password: nw }),
      });
      if (sres.ok) {
        const sdata = await sres.json();
        session.token = sdata.token;
        flittEnabled = Boolean(sdata.flitt_enabled);
        flittMode = sdata.flitt_mode || null;
        session.flittEnabled = flittEnabled;
        session.flittMode = flittMode;
      }
    } catch (_) { /* portal still works without online payment */ }

    localStorage.setItem('fh_member_session', JSON.stringify(session));
    window._fpcMember = null;
    startDashboard('overview');
  } catch (e) {
    console.error(e);
    showFpcError('შენახვა ვერ მოხერხდა. სცადეთ ხელახლა.');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-check mr-2"></i> პაროლის განახლება';
  }
};

// ── Load data with real-time listeners ────────────────────────────────────
async function loadMemberData() {
  if (!session?.memberId) { doLogout(); return; }
  stopListeners();

  // Real-time member doc listener
  memberUnsub = onSnapshot(doc(db, 'members', session.memberId), snap => {
    if (!snap.exists()) { doLogout(); return; }
    const wasLoaded = !!member;
    member = { id: snap.id, ...snap.data() };
    updateSidebarStatus();
    if (wasLoaded) renderTabContent();
    if (member.trainerId) loadTrainerCard(member.trainerId);
  }, () => loadMemberDataFallback());

  // Real-time visits listener — no orderBy to avoid composite index requirement; sort in JS
  visitsUnsub = onSnapshot(
    query(collection(db, 'check_ins'), where('memberId', '==', session.memberId), limit(200)),
    snap => {
      visits = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (b.checkInTime || '').localeCompare(a.checkInTime || ''));
      if (activeTab === 'visits') renderTabContent();
    },
    () => loadVisitsFallback()
  );

  // Real-time training sessions (trainer calendar)
  sessionsUnsub = onSnapshot(
    query(collection(db, 'training_sessions'), where('clientId', '==', session.memberId), limit(300)),
    snap => {
      mySessions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (activeTab === 'workouts') renderTabContent();
    },
    () => {}
  );

  // Real-time trainer payments (my own only)
  trainerPayUnsub = onSnapshot(
    query(collection(db, 'trainer_payments'), where('clientId', '==', session.memberId), limit(200)),
    snap => {
      myTrainerPayments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (activeTab === 'status') renderTabContent();
    },
    () => {}
  );

  // Load payments and history — no orderBy compound query; sort in JS
  try {
    const txSnap = await getDocs(query(collection(db, 'transactions'), where('memberId', '==', session.memberId)));
    const txs = txSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    payments = txs
      .filter(t => t.category === 'membership' || t.type === 'membership_registration' || t.type === 'membership_renewal')
      .sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
    subHistory = [...payments];
  } catch(e) {
    await loadPaymentsFallback();
  }
}

async function loadTrainerCard(trainerId) {
  try {
    const tSnap = await getDoc(doc(db, 'trainers', trainerId));
    if (!tSnap.exists()) return;
    const t = { id: tSnap.id, ...tSnap.data() };
    const photoWrap = document.getElementById('trainer-photo-wrap');
    const detailsWrap = document.getElementById('trainer-details-wrap');
    if (photoWrap) photoWrap.innerHTML = t.photoUrl
      ? `<img src="${t.photoUrl}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid #ef4444;" onerror="this.style.display='none'">`
      : `<div style="width:64px;height:64px;border-radius:50%;background:rgba(239,68,68,0.2);color:#ef4444;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.5rem;">${(t.firstName||'T').charAt(0)}</div>`;
    if (detailsWrap) detailsWrap.innerHTML = `
      <div style="color:#ef4444;font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;"><i class="fas fa-dumbbell"></i> ჩემი ტრენერი</div>
      <div style="font-weight:900;color:#e2e8f0;font-size:1rem;">${t.firstName || ''} ${t.lastName || ''}</div>
      ${t.phone ? `<div style="color:#94a3b8;font-size:0.82rem;margin-top:2px;"><i class="fas fa-phone" style="font-size:0.75rem;"></i> ${t.phone}</div>` : ''}
    `;
  } catch(_) {}
}

async function loadVisitsFallback() {
  try {
    const pid = 'fit-house-gym-d3595';
    const url = `https://firestore.googleapis.com/v1/projects/${pid}/databases/(default)/documents:runQuery`;
    const body = { structuredQuery: { from: [{ collectionId: 'check_ins' }], where: { fieldFilter: { field: { fieldPath: 'memberId' }, op: 'EQUAL', value: { stringValue: session.memberId } } }, limit: 200 } };
    const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!r.ok) return;
    const results = await r.json();
    visits = (results || [])
      .filter(row => row.document)
      .map(row => {
        const f = row.document.fields || {};
        return Object.fromEntries(Object.entries(f).map(([k, v]) => [k, Object.values(v)[0]]));
      })
      .sort((a, b) => (b.checkInTime || '').localeCompare(a.checkInTime || ''));
    if (activeTab === 'visits') renderTabContent();
  } catch(_) {}
}

async function loadPaymentsFallback() {
  try {
    const pid = 'fit-house-gym-d3595';
    const url = `https://firestore.googleapis.com/v1/projects/${pid}/databases/(default)/documents:runQuery`;
    const body = { structuredQuery: { from: [{ collectionId: 'transactions' }], where: { fieldFilter: { field: { fieldPath: 'memberId' }, op: 'EQUAL', value: { stringValue: session.memberId } } }, limit: 100 } };
    const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!r.ok) return;
    const results = await r.json();
    const txs = (results || [])
      .filter(row => row.document)
      .map(row => {
        const f = row.document.fields || {};
        return Object.fromEntries(Object.entries(f).map(([k, v]) => [k, Object.values(v)[0]]));
      });
    payments = txs
      .filter(t => t.category === 'membership' || t.type === 'membership_registration' || t.type === 'membership_renewal')
      .sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
    subHistory = [...payments];
    if (activeTab === 'payments' || activeTab === 'history') renderTabContent();
  } catch(_) {}
}

async function loadMemberDataFallback() {
  try {
    const pid = 'fit-house-gym-d3595';
    const url = `https://firestore.googleapis.com/v1/projects/${pid}/databases/(default)/documents/members/${session.memberId}`;
    const r = await fetch(url);
    if (r.ok) {
      const d = await r.json();
      const f = d.fields || {};
      member = { id: session.memberId, ...Object.fromEntries(Object.entries(f).map(([k,v]) => [k, Object.values(v)[0]])) };
      renderTabContent();
    }
  } catch(_) {}
}

function stopListeners() {
  if (memberUnsub) { memberUnsub(); memberUnsub = null; }
  if (visitsUnsub) { visitsUnsub(); visitsUnsub = null; }
  if (sessionsUnsub) { sessionsUnsub(); sessionsUnsub = null; }
  if (trainerPayUnsub) { trainerPayUnsub(); trainerPayUnsub = null; }
}

// ── Tab content rendering ─────────────────────────────────────────────────
function renderTabContent() {
  if (!member && activeTab !== 'qr') {
    document.getElementById('tab-content').innerHTML = `<div class="flex items-center justify-center h-40 text-slate-500"><i class="fas fa-spinner fa-spin mr-2"></i> იტვირთება...</div>`;

  }
  const el = document.getElementById('tab-content');
  if (!el) return;
  switch(activeTab) {
    case 'overview': el.innerHTML = renderOverview(); break;
    case 'sub': el.innerHTML = renderSubscription(); break;
    case 'renew': el.innerHTML = renderRenew(); renderRenewBody(); break;
    case 'qr': el.innerHTML = renderQrTab(); startQrScanner(); break;
    case 'visits': el.innerHTML = renderVisits(); break;
    case 'payments': el.innerHTML = renderPayments(); break;
    case 'workouts': el.innerHTML = renderWorkouts(); break;
    case 'status': el.innerHTML = renderStatus(); break;
    case 'history': el.innerHTML = renderHistory(); break;
  }
}

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">

               onkeydown="if(event.key==='Enter')window.unlockPayments()">
        <button type="button" class="pw-toggle-btn" onclick="window.togglePwVisibility('unlock-pass', this)">
          <i class="fas fa-eye"></i>
        </button>
      </div>
      <div id="unlock-error" style="display:none;margin-bottom:12px;padding:10px 14px;border-radius:10px;
           background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171;font-size:0.82rem;font-weight:700;"></div>
      <button id="unlock-btn" class="btn-primary" onclick="window.unlockPayments()">
        <i class="fas fa-unlock mr-2"></i> გაგრძელება
      </button>
    </div>
  `;
}

window.unlockPayments = async function () {
  const input = document.getElementById('unlock-pass');
  const btn = document.getElementById('unlock-btn');
  const err = document.getElementById('unlock-error');
  const pass = input?.value?.trim();
  if (!pass) return;

  const showErr = (msg) => { if (err) { err.textContent = msg; err.style.display = 'block'; } };
  if (err) err.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> მოწმდება...';

  try {
    const res = await fetch(`${API_BASE}/auth/session`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: session.email, password: pass }),
    });
    const data = await res.json();
    if (!res.ok) {
      showErr(data.error === 'Invalid credentials' ? 'პაროლი არასწორია' : (data.error || 'შეცდომა'));
      return;
    }
    session.token = data.token;
    flittEnabled = Boolean(data.flitt_enabled);
    flittMode = data.flitt_mode || null;
    session.flittEnabled = flittEnabled;
    session.flittMode = flittMode;
    localStorage.setItem('fh_member_session', JSON.stringify(session));
    renderRenewBody();
  } catch (_) {
    showErr('კავშირის შეცდომა. სცადეთ ხელახლა.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-unlock mr-2"></i> გაგრძელება';
  }
};

function renderRenewBody() {
  const wrap = document.getElementById('renew-body');
  if (!wrap) return;

  if (session && !session.token) { wrap.innerHTML = renderUnlockPrompt(); return; }

  if (!flittEnabled) {
    wrap.innerHTML = `
      <div style="text-align:center;padding:40px 20px;color:#475569;">
        <i class="fas fa-store-slash" style="font-size:2.4rem;margin-bottom:14px;display:block;"></i>
        <p style="font-size:0.9rem;line-height:1.6;">ონლაინ გადახდა ამ ანგარიშზე ჯერ არ არის ხელმისაწვდომი.<br>
        აბონემენტის განახლებისთვის მიმართეთ ადმინისტრატორს.</p>
      </div>`;
    return;
  }

  wrap.innerHTML = `
    <div id="flitt-plans" style="display:grid;gap:10px;margin-bottom:16px;"></div>
    <div id="flitt-error" style="display:none;margin-bottom:12px;padding:10px 14px;border-radius:10px;
         background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171;font-size:0.82rem;font-weight:700;"></div>
    <button id="flitt-pay-btn" class="btn-primary" onclick="window.startFlittPayment()" disabled>
      <i class="fas fa-credit-card mr-2"></i> გადახდა
    </button>
  `;
  loadFlittPlans();
}

async function loadFlittPlans() {
  if (!flittEnabled) return;
  try {
    const snap = await getDocs(collection(db, 'subscription_plans'));
    flittPlans = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .filter(p => p.active !== false)
      .sort((a, b) => (a.order || 99) - (b.order || 99));
  } catch (_) {
    flittPlans = [];
  }
  renderFlittPlans();
}

function planMeta(p) {
  const bits = [];
  if (p.remainingVisits != null) bits.push(`${p.remainingVisits} ვიზიტი`);
  else bits.push('ულიმიტო');
  if (p.durationDays) bits.push(p.durationDays === 1 ? '1 დღე' : `${p.durationDays} დღე`);
  return bits.join(' • ');
}

function renderFlittPlans() {
  const wrap = document.getElementById('flitt-plans');
  if (!wrap) return;
  if (!flittPlans.length) {
    wrap.innerHTML = '<div style="color:#475569;font-size:0.85rem;text-align:center;padding:20px;">ტარიფები ვერ ჩაიტვირთა.</div>';
    return;
  }
  // Whole card is the tap target — small radio dots are painful on a phone.
  wrap.innerHTML = flittPlans.map(p => {
    const sel = flittSelectedPlanId === p.id;
    return `
      <button type="button" onclick="window.selectFlittPlan('${p.id}')"
        style="display:flex;align-items:center;gap:14px;width:100%;text-align:left;padding:16px;
             border:2px solid ${sel ? '#ef4444' : '#1e293b'};border-radius:14px;cursor:pointer;
             background:${sel ? 'rgba(239,68,68,0.08)' : '#0b1220'};transition:all .15s;
             -webkit-tap-highlight-color:transparent;">
        <span style="width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;
                     justify-content:center;border:2px solid ${sel ? '#ef4444' : '#334155'};
                     background:${sel ? '#ef4444' : 'transparent'};">
          ${sel ? '<i class="fas fa-check" style="color:#fff;font-size:0.65rem;"></i>' : ''}
        </span>
        <span style="flex:1;min-width:0;">
          <span style="display:block;font-weight:800;color:#e2e8f0;font-size:0.95rem;">${p.name}</span>
          <span style="display:block;color:#64748b;font-size:0.76rem;margin-top:2px;">${planMeta(p)}</span>
        </span>
        <span style="font-weight:900;color:#10b981;font-size:1.05rem;white-space:nowrap;">${p.price}₾</span>
      </button>`;
  }).join('');
}

window.selectFlittPlan = function (planId) {
  flittSelectedPlanId = planId;
  const btn = document.getElementById('flitt-pay-btn');
  if (btn) btn.disabled = false;
  renderFlittPlans();
};

function showFlittError(message) {
  const el = document.getElementById('flitt-error');
  if (!el) return;
  el.textContent = message;
  el.style.display = 'block';
}

window.startFlittPayment = async function () {
  const btn = document.getElementById('flitt-pay-btn');
  const errEl = document.getElementById('flitt-error');
  if (!btn || btn.disabled) return;
  if (!flittSelectedPlanId) { showFlittError('აირჩიეთ აბონემენტი'); return; }
  if (errEl) errEl.style.display = 'none';

  // Guard against a double click creating two payment attempts.
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> მიმდინარეობს...';

  try {
    const res = await fetch(`${API_BASE}/payments/flitt/checkout`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${session.token}`,
      },
      // Only the plan id travels — the server decides the amount.
      body: JSON.stringify({ membership_plan_id: flittSelectedPlanId }),
    });
    const data = await res.json();

    if (!res.ok) {
      showFlittError(data.error || 'გადახდის დაწყება ვერ მოხერხდა');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-credit-card mr-2"></i> Flitt-ით გადახდა';
      return;
    }

    localStorage.setItem('fh_flitt_pending', data.payment_id);
    window.location.href = data.checkout_url;
  } catch (_) {
    showFlittError('კავშირის შეცდომა. სცადეთ ხელახლა.');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-credit-card mr-2"></i> Flitt-ით გადახდა';

};

      </div>

      </div>

function startQrScanner() {
  if (qrScannerRunning) return;
  const el = document.getElementById('qr-reader');
  if (!el) return;
  try {
    qrScanner = new Html5Qrcode('qr-reader');
    qrScanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 280, height: 280 } },
      (decoded) => {
        stopQrScanner();
        handleScannedQr(decoded);
      },
      () => {}
    ).then(() => { qrScannerRunning = true; }).catch(err => {
      el.innerHTML = `<div style="padding:32px;text-align:center;color:#f87171;font-size:0.85rem;"><i class="fas fa-video-slash" style="font-size:2rem;margin-bottom:12px;display:block;"></i>კამერაზე წვდომა ვერ მოხერხდა. შეამოწმეთ ბრაუზერის ნებართვები.</div>`;
    });
  } catch(e) {
    el.innerHTML = `<div style="padding:24px;text-align:center;color:#64748b;">QR სკანერი ვერ ჩაიტვირთა</div>`;
  }
}

function stopQrScanner() {
  if (qrScanner) {
    const sc = qrScanner;
    qrScanner = null;
    qrScannerRunning = false;
    sc.stop().then(() => sc.clear().catch(()=>{})).catch(() => { try { sc.clear(); } catch(_){} });
  } else {
    qrScannerRunning = false;
  }
}

async function handleScannedQr(decoded) {
  // Extract checkin token from decoded string (may be full URL or just token)
  let token = decoded;
  try {
    const url = new URL(decoded);
    token = url.searchParams.get('checkin') || decoded;
  } catch(_) {}
  await autoProcessCheckin(token);
}

async function autoProcessCheckin(gymToken) {
  if (!gymToken) return;
  const resultEl = document.getElementById('checkin-result-area');
  if (resultEl) resultEl.innerHTML = `<div style="text-align:center;padding:24px;color:#94a3b8;"><i class="fas fa-spinner fa-spin mr-2"></i>მოწმდება...</div>`;

  try {
    // 1. Validate gym QR token
    const qrDoc = await getDoc(doc(db, 'gym_settings', 'gym_qr_config'));
    if (!qrDoc.exists() || qrDoc.data().token !== gymToken) {
      showCheckinResult('rejected', null, 'QR კოდი არასწორია', 'invalid_qr');
      await logCheckin('rejected', 'invalid_qr', gymToken);
      return;
    }

    // 2. Get fresh member data
    const mDoc = await getDoc(doc(db, 'members', session.memberId));
    if (!mDoc.exists()) {
      showCheckinResult('rejected', null, 'მომხმარებელი ვერ მოიძებნა', 'no_member');
      return;
    }
    const m = { id: mDoc.id, ...mDoc.data() };

    // 3. Apply check-in logic (mirrors existing app logic)
    const now = new Date();
    const hour = now.getHours();
    let result = 'approved', reason = '';

    if (m.status !== 'active') {
      result = 'denied'; reason = 'inactive_subscription';
    } else if (m.subscriptionEndDate && now > new Date(m.subscriptionEndDate)) {
      result = 'denied'; reason = 'expired_subscription';
      await updateDoc(doc(db, 'members', m.id), { status: 'expired' });
    } else if (m.remainingVisits !== null && m.remainingVisits <= 0) {
      result = 'denied'; reason = 'no_visits';
      await updateDoc(doc(db, 'members', m.id), { status: 'expired' });
    } else if (m.subscriptionType === 'morning' && (hour < 9 || hour >= 16)) {
      result = 'denied'; reason = 'time_restriction';
    }

    // 4. If approved, update member stats
    if (result === 'approved') {
      const updates = { lastVisit: now.toISOString(), totalVisits: (m.totalVisits || 0) + 1 };
      if (m.remainingVisits !== null) {
        updates.remainingVisits = m.remainingVisits - 1;
        if (updates.remainingVisits <= 0) updates.status = 'expired';
      }
      await updateDoc(doc(db, 'members', m.id), updates);
    }

    // 5. Log check-in
    await logCheckin(result, reason, gymToken, m);

    // 6. Show result
    showCheckinResult(result, m, reasonText(reason), reason);

  } catch(err) {
    console.error('checkin error', err);
    if (resultEl) resultEl.innerHTML = `<div style="text-align:center;padding:24px;color:#f87171;">შეცდომა. სცადეთ ხელახლა.</div>`;
  }
}

function reasonText(r) {
  const map = {
    expired_subscription: 'აბონემენტი ვადაგასულია',
    inactive_subscription: 'აბონემენტი არ არის აქტიური',
    no_visits: 'ვიზიტები ამოწურულია',
    invalid_qr: 'QR კოდი არასწორია',
    time_restriction: 'მხოლოდ 09:00–16:00 (დილის აბონემენტი)',
    no_member: 'მომხმარებელი ვერ მოიძებნა'
  };
  return map[r] || r;
}

function showCheckinResult(result, m, message, reason) {
  const el = document.getElementById('checkin-result-area');
  if (!el) return;
  // Hide scanner after result
  const wrap = document.getElementById('qr-scanner-wrap');
  if (wrap) wrap.style.display = 'none';
  const approved = result === 'approved';
  const rDays = m?.subscriptionEndDate ? remainingDays(m.subscriptionEndDate) : 0;
  el.innerHTML = `
    <div class="${approved ? 'checkin-result-approved' : 'checkin-result-rejected'} anim-in">
      <div class="checkin-headline" style="color:${approved ? '#10b981' : '#ef4444'};margin-bottom:12px;">
        ${approved ? '✅ შესვლა<br>დადასტურებულია' : '❌ შესვლა<br>უარყოფილია'}
      </div>
      ${m ? `<p style="font-size:1rem;font-weight:800;color:#e2e8f0;margin-bottom:8px;">${m.firstName} ${m.lastName}</p>` : ''}
      ${approved ? `
        <p style="color:#94a3b8;font-size:0.85rem;margin-bottom:2px;">აბონემენტი: <strong style="color:#e2e8f0;">${subName(m?.subscriptionType)}</strong></p>
        ${rDays > 0 ? `<p style="color:#94a3b8;font-size:0.85rem;margin-bottom:2px;">დარჩენილი დღეები: <strong style="color:#e2e8f0;">${rDays}</strong></p>` : ''}
        ${m?.remainingVisits != null ? `<p style="color:#94a3b8;font-size:0.85rem;">დარჩენილი ვიზიტები: <strong style="color:#e2e8f0;">${Math.max(0, (m.remainingVisits||0) - 1)}</strong></p>` : ''}
      ` : `
        ${message ? `<p style="color:#f87171;font-size:0.88rem;margin-top:8px;">მიზეზი: <strong>${message}</strong></p>` : ''}
      `}
      <button onclick="retryCheckin()" style="margin-top:20px;padding:10px 24px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#e2e8f0;font-weight:700;cursor:pointer;font-size:0.85rem;">ხელახლა სცადე</button>
    </div>
  `;
}

window.retryCheckin = function() {
  const el = document.getElementById('checkin-result-area');
  if (el) el.innerHTML = '';
  const wrap = document.getElementById('qr-scanner-wrap');
  if (wrap) wrap.style.display = '';
  startQrScanner();
};

async function logCheckin(result, reason, gymToken, m) {
  try {
    await addDoc(collection(db, 'check_ins'), {
      memberId: session.memberId,
      memberName: m ? `${m.firstName} ${m.lastName}`.trim() : (session.firstName+' '+session.lastName),
      phone: m?.phone || '—',
      personalId: m?.personalId || '—',
      subscriptionStatus: m ? effectiveStatus(m) : 'unknown',
      subscriptionType: m?.subscriptionType || '—',
      result,
      reason: reason || '',
      qrToken: gymToken || '',
      checkInTime: new Date().toISOString(),
      source: 'member_portal'
    });
  } catch(_) {}
}

  </div>`;
}

// ── Tab: My Status (subscription + trainer payment) ────────────────────────
function renderStatus() {
  const isActive = effectiveStatus(member) === 'active';
  const rDays = member?.subscriptionEndDate ? remainingDays(member.subscriptionEndDate) : 0;
  const hasTrainer = member?.trainerServiceEnabled && member?.trainerId;
  const mk = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
  const paidThisMonth = myTrainerPayments.some(p => p.paymentMonth === mk && p.status === 'paid');
  const history = [...myTrainerPayments].filter(p=>p.status==='paid').sort((a,b)=>(b.paymentDate||'').localeCompare(a.paymentDate||''));
  return `
    <div class="space-y-6 anim-in">
      <div style="border-bottom:1px solid #1e293b;padding-bottom:16px;">
        <h2 style="font-size:1.4rem;font-weight:900;color:white;">ჩემი სტატუსი</h2>
        <p style="color:#64748b;font-size:0.85rem;margin-top:4px;">აბონემენტი და ტრენერის გადახდები</p>
      </div>
      <div style="background:#020617;border:1px solid #1e293b;border-radius:14px;padding:18px;">
        <h3 style="font-size:0.72rem;font-weight:800;text-transform:uppercase;color:#64748b;margin-bottom:12px;">აქტიური აბონემენტი</h3>
        <div class="grid grid-cols-2 gap-4">
          <div><span style="color:#475569;font-size:0.75rem;">ტიპი</span><p style="color:#e2e8f0;font-weight:800;">${subName(member?.subscriptionType)}</p></div>
          <div><span style="color:#475569;font-size:0.75rem;">სტატუსი</span><p>${isActive?'<span class="badge-active">აქტიური</span>':'<span class="badge-expired">ვადაგასული</span>'}</p></div>
          <div><span style="color:#475569;font-size:0.75rem;">ვადა</span><p style="color:#e2e8f0;font-weight:700;">${formatD(member?.subscriptionEndDate)}</p></div>
          <div><span style="color:#475569;font-size:0.75rem;">დარჩენილი</span><p style="color:#e2e8f0;font-weight:700;">${rDays>0?rDays+' დღე':'—'}${member?.remainingVisits!=null?' / '+member.remainingVisits+' ვიზიტი':''}</p></div>
        </div>
      </div>
      ${hasTrainer ? `
        <div style="background:#020617;border:1px solid ${paidThisMonth?'#1e293b':'rgba(239,68,68,0.3)'};border-radius:14px;padding:18px;">
          <h3 style="font-size:0.72rem;font-weight:800;text-transform:uppercase;color:#64748b;margin-bottom:12px;">ტრენერის მომსახურება — ${M_MONTHS[new Date().getMonth()]}</h3>
          <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
            <span style="color:#94a3b8;font-size:0.9rem;">მიმდინარე თვის გადახდა</span>
            ${paidThisMonth ? '<span class="badge-active" style="font-size:0.85rem;padding:4px 14px;">✅ გადახდილია</span>' : '<span class="badge-expired" style="font-size:0.85rem;padding:4px 14px;">❌ გადაუხდელია</span>'}
          </div>
        </div>
        <div>
          <h3 style="font-size:0.78rem;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;color:#64748b;margin-bottom:10px;">გადახდების ისტორია</h3>
          ${history.length===0 ? `<div style="text-align:center;padding:30px;color:#475569;">გადახდები ჯერ არ დაფიქსირებულა</div>` : `
            <div class="space-y-2">${history.map(p=>`
              <div style="background:#020617;border:1px solid #1e293b;border-radius:12px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;">
                <div><div style="font-weight:700;color:#e2e8f0;">${p.paymentMonth}</div>
                <div style="font-size:0.75rem;color:#64748b;margin-top:2px;">${formatD(p.paymentDate)}${p.note?' &bull; '+p.note:''}</div></div>
                <span style="color:#34d399;font-weight:800;">${p.amount}₾</span>
              </div>`).join('')}</div>`}
        </div>
      ` : `<div style="text-align:center;padding:30px;color:#475569;"><i class="fas fa-user-tie" style="font-size:2rem;margin-bottom:12px;display:block;"></i>ტრენერის მომსახურება არ გაქვთ გააქტიურებული</div>`}
    </div>`;
}

// ── Logout ─────────────────────────────────────────────────────────────────
window.changePassword = async function() {
  const cur = document.getElementById('pw-current')?.value?.trim();
  const nw = document.getElementById('pw-new')?.value?.trim();
  const cf = document.getElementById('pw-confirm')?.value?.trim();
  const msgEl = document.getElementById('pw-msg');
  const btn = document.getElementById('pw-btn');

  function showPwMsg(text, ok) {
    if (!msgEl) return;
    msgEl.innerHTML = `<div style="margin-bottom:12px;padding:10px 14px;border-radius:10px;font-size:0.82rem;font-weight:700;background:${ok ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)'};border:1px solid ${ok ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)'};color:${ok ? '#34d399' : '#f87171'};display:flex;gap:8px;align-items:center;"><i class="fas fa-${ok ? 'check-circle' : 'exclamation-circle'}"></i>${text}</div>`;
  }

  if (!cur || !nw || !cf) { showPwMsg('შეავსეთ ყველა ველი', false); return; }
  if (nw !== cf) { showPwMsg('ახალი პაროლები არ ემთხვევა', false); return; }
  if (nw.length < 3) { showPwMsg('პაროლი ძალიან მოკლეა', false); return; }

  btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> მიმდინარეობს...';
  try {
    const mDoc = await getDoc(doc(db, 'members', session.memberId));
    if (!mDoc.exists()) { showPwMsg('მომხმარებელი ვერ მოიძებნა', false); return; }
    const m = mDoc.data();
    // check password field first, fall back to personalId for existing users
    const currentValid = m.password ? m.password === cur : m.personalId === cur;
    if (!currentValid) { showPwMsg('მიმდინარე პაროლი არასწორია', false); return; }
    await updateDoc(doc(db, 'members', session.memberId), { password: nw });
    showPwMsg('პაროლი წარმატებით შეიცვალა!', true);
    showPasswordSuccessOverlay();
    document.getElementById('pw-current').value = '';
    document.getElementById('pw-new').value = '';
    document.getElementById('pw-confirm').value = '';
  } catch(e) {
    showPwMsg('შეცდომა. სცადეთ ხელახლა.', false);
  } finally {
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> პაროლის განახლება';
  }
};

window.togglePwVisibility = function(inputId, btn) {
  const inp = document.getElementById(inputId);
  if (!inp) return;
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.innerHTML = show ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
};

function showPasswordSuccessOverlay() {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:99999;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s ease;';
  overlay.innerHTML = `
    <div style="background:#0f172a;border:1px solid rgba(16,185,129,0.4);border-radius:20px;padding:32px 40px;text-align:center;max-width:360px;animation:scaleIn 0.25s ease;">
      <div style="width:64px;height:64px;background:rgba(16,185,129,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;border:2px solid #10b981;">
        <i class="fas fa-check" style="color:#10b981;font-size:1.5rem;"></i>
      </div>
      <div style="font-size:1.2rem;font-weight:900;color:#f1f5f9;margin-bottom:8px;">პაროლი განახლდა!</div>
      <div style="color:#94a3b8;font-size:0.88rem;margin-bottom:20px;">პაროლი წარმატებით შეიცვალა.</div>
      <button onclick="this.closest('[style*=fixed]').remove()" style="padding:10px 28px;background:linear-gradient(135deg,#10b981,#059669);color:white;border:none;border-radius:10px;font-weight:800;cursor:pointer;">OK</button>
    </div>`;
  if (!document.getElementById('pw-anim-style')) {
    const s = document.createElement('style');
    s.id = 'pw-anim-style';
    s.textContent = '@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes scaleIn{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}';
    document.head.appendChild(s);
  }
  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), 2500);
}

window.doLogout = function() {
  stopListeners();
  stopQrScanner();
  session = null; member = null; visits = []; payments = []; subHistory = [];
  localStorage.removeItem('fh_member_session');
  window.location.href = '/member';
};
</script>
